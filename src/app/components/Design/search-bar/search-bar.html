<div class="search-wrap">
  <input
    type="text"
    class="search-input"
    [placeholder]="placeholder()"
    [value]="query()"
    (input)="onInput($event)"
    (keydown.enter)="submit()"
  />
  <app-round-button class="search-btn" [iconOnly]="true" (clicked)="submit()">
    <app-icon name="magnifying-glass-solid-full" [size]="25" ariaLabel="Rechercher" />
  </app-round-button>
</div>
