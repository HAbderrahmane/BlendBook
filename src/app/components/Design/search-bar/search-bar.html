<div class="search-wrap">
  <input
    type="text"
    class="search-input"
    [placeholder]="placeholder() | translate"
    [value]="query()"
    (input)="onInput($event)"
    (keydown.enter)="submit()"
  />
  <app-icon
    class="search-btn"
    name="magnifying-glass-solid-full"
    [size]="25"
    [ariaLabel]="'search.aria' | translate"
    (click)="submit()"
  />
</div>
