<footer class="footer-shell">
  <div class="footer-left">
    <p class="footer-title">{{ 'footer.title' | translate }}</p>
    <p class="footer-subtitle">{{ 'footer.subtitle' | translate }}</p>
  </div>

  <p class="footer-center" [attr.aria-label]="'footer.copyright' | translate">
    <span class="footer-copyright-icon">&copy;</span>
    2025-2026
  </p>

  <a
    class="footer-github"
    href="https://github.com/HAbderrahmane"
    target="_blank"
    rel="noopener noreferrer"
    [attr.aria-label]="'footer.github' | translate"
    [title]="'footer.github' | translate"
  >
    <span class="footer-handle">HAbderrahmane</span>
    <app-icon name="github" [size]="25" [ariaLabel]="'footer.github' | translate" />
  </a>
</footer>
